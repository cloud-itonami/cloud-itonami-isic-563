# Nightly regeneration -- rebuild docs/samples/operator-console.html
# through the REAL actor (beverageops.render-html, driving
# beverageops.operation/beverageops.governor/beverageops.store) and
# commit only when the rendered console actually changed. Closes
# flagship checklist item 2 (com-junkawasaki/root ADR-2607189300,
# Wave5 rollout): this repo previously had NO demo page, no
# docs/samples/, and no generator at all.
#
# JVM Clojure (clojure -M), not nbb -- this repo's own README documents
# `nbb run-tests.cljs`/`nbb run-demo.cljs`, but that pair is broken
# under nbb (`format` does not resolve in ClojureScript; confirmed by
# running it before writing this workflow) and is unrelated to this
# renderer anyway. `beverageops.render-html` is plain JVM Clojure with
# a single external dep (org.clojure/clojure itself) -- no sibling
# kotoba-lang checkouts needed, unlike sibling actors in this fleet
# (e.g. cloud-itonami-isic-851/schoolops) whose langgraph-clj-based
# operation.cljc requires kotoba-lang/langgraph + kotoba-lang/langchain
# as sibling checkouts. This repo's own operation.cljc never
# `:require`s langgraph (confirmed by grep), so deps.edn's previous,
# stale top-level langgraph-clj dependency was removed rather than
# wired up here (see deps.edn comment). Checkout layout still mirrors
# the fleet's standard `orgs/<org>/<repo>` west-project path even
# though nothing else needs to sit alongside it, for consistency with
# every other actor in this fleet.
#
# Fork note: this runs on the default GITHUB_TOKEN (contents: write).
# If your org disables Actions, run `clojure -M:render-html` from any
# scheduler (see docs/operator-quickstart.md).
name: regenerate-console
on:
  schedule:
    - cron: '23 17 * * *'   # 02:23 JST nightly (off-minute on purpose, distinct from sibling repos' 03/07/11/13/19/29/31/37/41/43/47/49/53 slots)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: orgs/cloud-itonami/cloud-itonami-isic-563
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: regenerate through the real actor
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-563
        run: clojure -M:render-html
      - name: verify (real output, not scaffolding)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-563
        run: |
          grep -q 'beverageops.render-html' docs/samples/operator-console.html
          grep -q '<tbody>' docs/samples/operator-console.html
          test "$(wc -l < docs/samples/operator-console.html)" -gt 30
          echo "operator console sanity ok"
      - name: commit when changed
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-563
        run: |
          if ! git diff --quiet docs/; then
            git config user.name "regenerate-console[bot]"
            git config user.email "noreply@github.com"
            git add docs/
            git commit -m "chore(console): nightly regeneration through the real actor"
            git push
          else
            echo "console unchanged"
          fi
